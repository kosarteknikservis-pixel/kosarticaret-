# Manuel: GitHub → Actions → "Canlıya gönder" → Run workflow
# İlk kurulum (ürün + görseller): yerelde canli-paket-hazirla.bat → DirectAdmin zip

name: Canlıya gönder

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      onay:
        description: 'Onay için "canli" yazın'
        required: true
        default: ''
      blog_aktar:
        description: 'database/blog-export.json varsa blog içeriklerini canlıya aktar'
        required: true
        type: boolean
        default: false
      analitik_sifirla:
        description: 'Müşteri hareketleri analitik verilerini sıfırla (analytics:reset --force)'
        required: true
        type: boolean
        default: false

jobs:
  deploy:
    if: github.event.inputs.onay == 'canli'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Kodu al
        uses: actions/checkout@v4

      - name: PHP 8.3 + Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Production bağımlılıklar
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Vite asset build
        run: |
          npm ci
          npm run build

      - name: SSH anahtarı
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          # SSH bağlantı sağlamlık ayarları
          cat >> ~/.ssh/config <<'EOF'
          Host *
            ConnectTimeout 30
            ServerAliveInterval 20
            ServerAliveCountMax 6
            StrictHostKeyChecking no
          EOF

      - name: kosar/ kodunu sunucuya gönder
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        # Bağlantı kopunca 3 kere dener (30s, 60s, 90s bekleme)
        run: |
          RSYNC="rsync -avz --no-perms --omit-dir-times --timeout=120"
          EXCLUDE="--exclude .env --exclude database/database.sqlite --exclude storage/app/public --exclude storage/logs --exclude storage/framework --exclude node_modules --exclude .git --exclude tests --exclude deploy"

          for attempt in 1 2 3; do
            echo "Deneme $attempt/3..."
            $RSYNC $EXCLUDE ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/kosar/" && break
            [ $attempt -lt 3 ] && echo "Bağlantı hatası, ${attempt}0sn bekleniyor..." && sleep $((attempt * 30))
          done

      - name: public_html/ (css, js, giriş dosyaları)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          RSYNC="rsync -avz --no-perms --omit-dir-times --timeout=60"
          $RSYNC public/css public/js public/build public/favicon.svg public/robots.txt \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/public_html/" 2>/dev/null || true
          scp deploy/public_html/index.php deploy/public_html/.htaccess \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/public_html/"
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "ln -sfn ../kosar/storage/app/public ${DEPLOY_PATH}/public_html/storage"

      - name: Sunucuda yeni migrationlari çalıştır
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "cd ${DEPLOY_PATH}/kosar && \
            PHP_BIN=\$(command -v php || echo /usr/local/php83/bin/php) && \
            \$PHP_BIN artisan migrate --force --path=database/migrations/2026_06_01_140000_create_order_logs_table.php && \
            \$PHP_BIN artisan migrate --force --path=database/migrations/2026_06_01_170000_create_email_marketing_tables.php && \
            \$PHP_BIN artisan migrate --force --path=database/migrations/2026_06_01_171500_add_html_mode_to_email_marketing_tables.php && \
            \$PHP_BIN artisan migrate --force --path=database/migrations/2026_06_01_183000_add_parasut_fields_to_orders_table.php && \
            \$PHP_BIN artisan migrate --force --path=database/migrations/2026_06_03_060000_create_customer_analytics_tables.php && \
            \$PHP_BIN artisan migrate --force --path=database/migrations/2026_06_03_100000_add_customer_name_to_abandoned_carts_table.php && \
            \$PHP_BIN artisan migrate --force --path=database/migrations/2026_06_09_100000_add_phase2_store_features.php && \
            \$PHP_BIN artisan migrate --force --path=database/migrations/2026_06_09_120000_create_page_speed_audits_table.php && \
            \$PHP_BIN artisan migrate --force --path=database/migrations/2026_06_10_100000_create_marketplace_tables.php && \
            \$PHP_BIN artisan migrate --force --path=database/migrations/2026_06_11_100000_create_marketplace_external_categories_table.php && \
            \$PHP_BIN artisan migrate --force --path=database/migrations/2026_06_15_100000_add_payment_tracking_fields_to_orders_table.php && \
            \$PHP_BIN artisan migrate --force --path=database/migrations/2026_06_16_100000_create_order_shipments_tables.php"

      - name: Sunucuda önbellek temizle
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "cd ${DEPLOY_PATH}/kosar && \
            (command -v php >/dev/null && php artisan config:cache && php artisan route:cache && php artisan view:cache) || \
            (/usr/local/php83/bin/php artisan config:cache && /usr/local/php83/bin/php artisan route:cache && /usr/local/php83/bin/php artisan view:cache)"

      - name: Zamanlayıcı görevlerini çalıştır (ödeme hatırlatma vb.)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "cd ${DEPLOY_PATH}/kosar && \
            PHP_BIN=\$(command -v php || echo /usr/local/php83/bin/php) && \
            \$PHP_BIN artisan schedule:run && \
            echo 'NOT: Saatlik otomatik hatırlatma icin sunucu cron: * * * * * cd ${DEPLOY_PATH}/kosar && php artisan schedule:run'"

      - name: Müşteri hareketleri analitiğini sıfırla
        if: github.event.inputs.analitik_sifirla == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "cd ${DEPLOY_PATH}/kosar && \
            (command -v php >/dev/null && php artisan analytics:reset --force) || \
            (/usr/local/php83/bin/php artisan analytics:reset --force)"

      - name: Vadesi gelen blog yazılarını yayınla
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "cd ${DEPLOY_PATH}/kosar && \
            (command -v php >/dev/null && php artisan blog:publish-due --force) || \
            (/usr/local/php83/bin/php artisan blog:publish-due --force)"

      - name: Mevcut görselleri optimize et
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "cd ${DEPLOY_PATH}/kosar && \
            (command -v php >/dev/null && php artisan images:optimize-stored) || \
            (/usr/local/php83/bin/php artisan images:optimize-stored)"

      - name: Blog içeriklerini içe aktar
        if: github.event.inputs.blog_aktar == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "cd ${DEPLOY_PATH}/kosar && \
            if [ -f database/blog-export.json ]; then \
              (command -v php >/dev/null && php artisan blog:import database/blog-export.json --force) || \
              (/usr/local/php83/bin/php artisan blog:import database/blog-export.json --force); \
            else \
              echo 'database/blog-export.json bulunamadı, blog import atlandı.'; \
            fi"
